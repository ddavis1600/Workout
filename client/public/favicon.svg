  <rect x="3" y="3" width="58" height="58" fill="none" stroke="#4A5530" stroke-width="2.5" rx="3"/>
  <!-- Inner border: olive -->
  <rect x="7" y="7" width="50" height="50" fill="none" stroke="#4A5530" stroke-width="1" rx="2"/>
  <!-- Rising progress line -->
  <path d="M 14 48  L 24 41  L 34 30  L 44 19"
        fill="none" stroke="#3D4826" stroke-width="3.5"
