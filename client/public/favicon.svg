  <path d="M 37 17  L 44 19  L 42 27"
        fill="none" stroke="#3D4826" stroke-width="3.5"
        stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Data dots -->
  <circle cx="14" cy="48" r="3" fill="#3D4826"/>
  <circle cx="24" cy="41" r="3" fill="#3D4826"/>
  <circle cx="34" cy="30" r="3" fill="#3D4826"/>
